name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run CLI tests
        run: npm test
      - name: Validate question bank
        run: node bin/cli.js validate
      - name: Check bank coverage
        run: node bin/cli.js stats
      - name: Check generator prompt
        run: node bin/cli.js generate --domain catalog --count 1 --dry-run > /tmp/cba-generate-prompt.txt
      - name: Check npm package contents
        run: npm pack --dry-run
      - name: Audit source links
        if: matrix.node-version == 22
        run: node bin/cli.js audit-sources
