name: Sync CBA blueprint

# Keeps the exam "domain" fresh: weekly (and on demand) it compares the local blueprint
# weights with the live Linux Foundation page and opens an issue if they drifted.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compare local blueprint with the live LF page
        id: sync
        run: |
          set +e
          node bin/cli.js sync --write | tee sync-output.txt
          echo "code=$?" >> "$GITHUB_OUTPUT"
      - name: Open an issue if the blueprint drifted
        if: steps.sync.outputs.code == '3'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('sync-output.txt', 'utf8');
            const title = 'CBA blueprint may have changed — reconcile domains/weights';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'blueprint-sync',
            });
            const marker = existing.data.find(i => i.title === title);
            const note = [
              'The live CBA blueprint differs from the local copy.',
              '',
              '```',
              body.trim(),
              '```',
              '',
              'Update `src/lib/blueprint.js` and `spec/exam-blueprint.md` to match, then close this issue.',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            if (marker) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: marker.number, body: note });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: note, labels: ['blueprint-sync'] });
            }
